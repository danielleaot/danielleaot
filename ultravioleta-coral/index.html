<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fundamentos de Ipsum Aplicado · Módulo 01</title>
  <meta name="description" content="Módulo autoinstrucional de demonstração. Conteúdo de preenchimento (lorem ipsum).">

  <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">

  <!-- Fontes: em pacote SCORM offline, hospedar localmente e trocar por @font-face. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/componentes.css">
</head>

<body>
  <a class="pular-link" href="#conteudo">Pular para o conteúdo</a>

  <button type="button" class="hamburguer" id="hamburguer" aria-label="Abrir o sumário do módulo">
    <svg width="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
      <path d="M4 7h16M4 12h16M4 17h16" />
    </svg>
  </button>

  <div class="cortina" id="cortina"></div>

  <div class="casca">
    <!-- Trilha lateral -->
    <aside class="trilha" id="trilha" aria-label="Sumário do módulo">
      <div class="trilha__marca">
        <svg viewBox="0 0 48 48" aria-hidden="true">
          <circle cx="24" cy="24" r="13" fill="#6D4AC8" />
          <path d="M24 11v26" stroke="#FBF9FF" stroke-width="3" stroke-linecap="round" />
          <circle cx="24" cy="17" r="3" fill="#F4B740" />
          <circle cx="24" cy="31" r="3" fill="#FF6B5B" />
        </svg>
        <span>LOREM ACADEMY</span>
      </div>

      <nav class="trilha__nav" id="trilha-nav"></nav>

      <button type="button" class="trilha__toggle" id="trilha-toggle" aria-label="Expandir ou recolher o sumário">
        <span class="icone">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
            <path d="M9 6l6 6-6 6" />
          </svg>
        </span>
        <span>Sumário</span>
      </button>
    </aside>

    <!-- Conteúdo (renderizado por app.js) -->
    <div class="palco" id="palco"></div>
  </div>

  <!-- Modal: ampliação de figura -->
  <div class="modal" id="modal-imagem" role="dialog" aria-modal="true" aria-label="Figura ampliada">
    <div class="modal__caixa">
      <button type="button" class="modal__fechar" aria-label="Fechar">×</button>
      <img src="" alt="" width="800" height="500">
    </div>
  </div>

  <!-- Modal: verbete do glossário -->
  <div class="modal" id="modal-termo" role="dialog" aria-modal="true" aria-labelledby="modal-termo-titulo">
    <div class="modal__caixa modal__caixa--texto">
      <button type="button" class="modal__fechar" aria-label="Fechar">×</button>
      <h3 class="modal__termo" id="modal-termo-titulo"></h3>
      <p class="modal__texto"></p>
    </div>
  </div>

  <script src="scripts/conteudo.js"></script>
  <script src="scripts/componentes.js"></script>
  <script src="scripts/app.js"></script>
</body>

</html>
